name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install WASI libc headers
        run: |
          sudo apt-get update
          sudo apt-get install -y wasi-libc

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CC_wasm32_unknown_unknown: clang
          CFLAGS_wasm32_unknown_unknown: --sysroot=/usr -isystem /usr/include/wasm32-wasi
